<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeScanner — Inicio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>


  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="home.html" class="logo">
        <div class="logo-icon">🍴</div>
        <span class="logo-text">Recipe<span>Scanner</span></span>
      </a>
    </div>
    <nav class="sidebar-nav">
      <a href="home.html" class="nav-item active">
        <span class="nav-icon">🏠</span>
        <span data-i18n="nav_home">Home</span>
      </a>
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">📖</span>
        <span data-i18n="nav_recipes">My Recipes</span>
      </a>
      <a href="scan.html" class="nav-item">
        <span class="nav-icon">⚡</span>
        <span data-i18n="nav_scan">Scan Recipe</span>
      </a>
      <a href="prices.html" class="nav-item">
        <span class="nav-icon">🏷</span>
        <span data-i18n="nav_prices">My Prices</span>
      </a>
    </nav>
    <div class="sidebar-lang">
      <div class="lang-toggle">
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" data-lang="es" onclick="setLang('es')">ES</button>
        <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="avatar" id="user-avatar" onclick="document.getElementById('avatar-input').click()" title="Upload photo">
        <span id="avatar-initials">?</span>
        <div class="avatar-overlay">📷</div>
      </div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-firstname" id="user-firstname">…</span>
        <span class="sidebar-user-lastname" id="user-lastname"></span>
      </div>
      <button class="sidebar-user-menu" onclick="logout()" data-i18n-title="nav_signout" title="Sign out">⏻</button>
    </div>
  </aside>
  <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(event)">

  <!-- Main content -->
  <main class="app-layout">
    <div id="home-content">
      <div class="loading-center"><div class="spinner"></div></div>
    </div>
  
    <footer class="app-footer">
      <p data-i18n="footer_disclaimer">RecipeScanner no está afiliado ni patrocinado por ninguna de las marcas o supermercados mencionados en esta aplicación.</p>
    </footer>
</main>

  <script src="js/i18n.js?v=20"></script>
  <script src="js/api.js"></script>
  <script src="js/home.js?v=5"></script>
</body>
</html>
